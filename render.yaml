services:
  - type: web
    name: edusync-api
    runtime: node
    rootDir: .
    buildCommand: pnpm install --frozen-lockfile && pnpm --filter @edusync/database db:generate && pnpm --filter @edusync/api build
    startCommand: node apps/api/dist/index.js
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: CORS_ORIGIN
        value: https://pioxii.edusync.com.bo
      # Las siguientes se cargan manualmente en el dashboard de Render:
      - key: DATABASE_URL
        sync: false
      - key: DIRECT_URL
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: SUPABASE_JWT_SECRET
        sync: false
